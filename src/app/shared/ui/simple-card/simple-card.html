<p-card [header]="title()" styleClass="demo-card">
  <!-- ng-content acts as a placeholder for projected content -->
  <ng-content>
    <p class="text-sm text-color-secondary">
      Nothing was projected by the parent. The card still renders because the child owns the frame
      and this fallback message.
    </p>
    <div class="empty-state">Fallback content from the card component</div>
  </ng-content>
</p-card>
