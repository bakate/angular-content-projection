<p-card styleClass="advanced-card">
  <ng-content select="[card-header], .card-header">
    <div class="default-card-header flex flex-column justify-content-end p-4 border-round-lg">
      <span>Slot header par défaut</span>
      <strong>Aucun header personnalisé projeté</strong>
    </div>
  </ng-content>

  <ng-content select="[card-title], .card-title">
    <h3>Titre projeté par défaut</h3>
  </ng-content>

  <div class="mt-1">
    <ng-content select="[card-subtitle], .card-subtitle">
      <p class="text-sm text-color-secondary m-0">
        Ce sous-titre apparaît quand tu ne remplis pas le slot dédié.
      </p>
    </ng-content>
  </div>

  <div class="mt-3">
    <ng-content select="[card-content], .card-content">
      <p class="m-0">
        Tu gardes des valeurs par défaut utiles, mais chaque zone peut être remplacée.
      </p>
    </ng-content>
  </div>

  <ng-content select="[card-footer], .card-footer">
    <div class="flex justify-content-end gap-2 mt-4">
      <p-button label="Ferme" severity="secondary" [outlined]="true" />
      <p-button label="Continue" />
    </div>
  </ng-content>
</p-card>
