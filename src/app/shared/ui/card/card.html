<p-card styleClass="advanced-card">
  <ng-content select="[card-header], .card-header">
    <div class="default-card-header">
      <span>Default header slot</span>
      <strong>No custom header projected</strong>
    </div>
  </ng-content>

  <ng-content select="[card-title], .card-title">
    <h3>Default projected title</h3>
  </ng-content>

  <div class="mt-1">
    <ng-content select="[card-subtitle], .card-subtitle">
      <p class="text-sm text-color-secondary m-0">
        This subtitle appears because the parent did not fill the subtitle slot.
      </p>
    </ng-content>
  </div>

  <div class="mt-3">
    <ng-content select="[card-content], .card-content">
      <p class="m-0">
        The component keeps useful defaults, but every region can be replaced independently.
      </p>
    </ng-content>
  </div>

  <ng-content select="[card-footer], .card-footer">
    <div class="default-card-footer">
      <p-button label="Dismiss" severity="secondary" [outlined]="true" />
      <p-button label="Continue" />
    </div>
  </ng-content>
</p-card>
